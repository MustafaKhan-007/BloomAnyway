services:
  - type: web
    name: first-light
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && flask db upgrade
    startCommand: gunicorn "app:create_app()" --workers 2 --threads 4 --timeout 60
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: APP_ENV
        value: production
      - key: FLASK_APP
        value: "app:create_app"
      - key: DATABASE_URL
        fromDatabase:
          name: first-light-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: SITE_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: LEMONSQUEEZY_API_KEY
        sync: false
      - key: LEMONSQUEEZY_WEBHOOK_SECRET
        sync: false
      - key: LEMONSQUEEZY_STORE_ID
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false

databases:
  - name: first-light-db
    plan: basic-256mb

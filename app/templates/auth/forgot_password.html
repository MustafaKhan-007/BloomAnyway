{% extends "base.html" %}
{% block title %}Reset your password — {{ site.site_title }}{% endblock %}

{% block content %}
<section class="section">
  <div class="container auth-card" style="max-width: 460px;">
    <h1>No panic</h1>
    <hr class="horizon-rule horizon-rule--heading">
    <p>Tell us your email and we'll send a 6-digit code so you can set a new password.</p>
    <form method="post" action="{{ url_for('auth.forgot_password') }}" style="margin-top: 24px;">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required maxlength="255" autocomplete="email" autofocus>
      </div>
      <button class="btn btn--primary btn--wide" type="submit">Send me a reset code</button>
    </form>
    <p class="field-help" style="margin-top: 20px;">
      Remembered it after all? <a href="{{ url_for('auth.login') }}">Back to sign in</a>.
    </p>
  </div>
</section>
{% endblock %}

{% extends "base.html" %}
{% block title %}That link has rested — {{ site.site_title }}{% endblock %}

{% block content %}
<section class="section">
  <div class="container" style="max-width: 480px;">
    <h1>That link has done its work</h1>
    <hr class="horizon-rule horizon-rule--heading">
    <p>Login links only work once, and only for 15 minutes. No harm done &mdash; here's a fresh one.</p>
    <form method="post" action="{{ url_for('auth.login') }}" style="margin-top: 28px;">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label for="email">Your email</label>
        <input type="email" id="email" name="email" required maxlength="255" autocomplete="email">
      </div>
      <button class="btn btn--primary" type="submit">Send me a new link</button>
    </form>
  </div>
</section>
{% endblock %}

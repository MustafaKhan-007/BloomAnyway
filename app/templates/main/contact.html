{% extends "base.html" %}
{% block title %}Contact — {{ site.site_title }}{% endblock %}

{% block content %}
<section class="section">
  <div class="container" style="max-width: 560px;">
    <h1>Say hello</h1>
    <p>A question, a story, a stuck place &mdash; all welcome here.</p>
    <form method="post" action="{{ url_for('main.contact') }}" style="margin-top: 32px;">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="honeypot" aria-hidden="true">
        <label for="website">Leave this empty</label>
        <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
      </div>
      <div class="field">
        <label for="name">Your name</label>
        <input type="text" id="name" name="name" required maxlength="120" value="{{ form.get('name', '') }}">
      </div>
      <div class="field">
        <label for="email">Your email</label>
        <input type="email" id="email" name="email" required maxlength="255" value="{{ form.get('email', '') }}">
      </div>
      <div class="field">
        <label for="message">Your message</label>
        <textarea id="message" name="message" rows="6" required maxlength="5000">{{ form.get('message', '') }}</textarea>
      </div>
      <button class="btn btn--primary" type="submit">Send it over</button>
    </form>
  </div>
</section>
{% endblock %}
